<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · SEM</title>
    <style>
        :root {
            --bg-void: #07080D;
            --bg-base: #0d0f18;
            --bg-elevated: #131922;
            --gold: #f5c842;
            --gold-muted: #f5a623;
            --text-primary: #f0f4ff;
            --text-secondary: #8892a4;
            --text-muted: #4a5568;
            --border-subtle: rgba(255,255,255,0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 32px 24px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f5a623, #f5c842);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 32px;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 14px;
            border: 1px solid rgba(245, 200, 66, 0.3);
            background: rgba(245, 200, 66, 0.08);
            color: var(--gold);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .retry-btn:active {
            transform: scale(0.96);
            background: rgba(245, 200, 66, 0.14);
        }

        .status {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .cached-note {
            margin-top: 40px;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            color: var(--text-muted);
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Không có kết nối</h1>
    <p>Kiểm tra internet và thử lại. Các trang đã xem trước đó vẫn khả dụng offline.</p>

    <a class="retry-btn" onclick="tryReconnect()" href="javascript:void(0)">
        ↻ Thử lại
    </a>

    <div class="status">
        <div class="dot"></div>
        <span>Offline mode</span>
    </div>

    <div class="cached-note">
        💡 Anki, Quests và Dashboard đã được cache — thử truy cập lại khi có internet.
    </div>

    <script>
        function tryReconnect() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                // Try anyway — SW may have cached pages
                window.location.href = window.location.href;
            }
        }

        // Auto-redirect when connection restored
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
