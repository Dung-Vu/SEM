# ============================================
# English Quest — Docker Compose
# Next.js App (using host PostgreSQL)
# ============================================

services:
    # Next.js Application
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: eq-app
        restart: unless-stopped
        ports:
            - "3001:3000"
        env_file:
            - .env
        environment:
            DATABASE_URL: postgresql://postgres:130501@host.docker.internal:5432/sem
            NODE_ENV: production
            PRISMA_QUERY_ENGINE_LIBRARY: /app/node_modules/.prisma/client/libquery_engine-linux-musl-openssl-3.0.x.so.node
        extra_hosts:
            - "host.docker.internal:host-gateway"
